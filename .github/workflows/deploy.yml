name: Deploy AI-Corrector

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tanam commit SHA ke paket deploy; app menampilkannya di /health.
      # Ini yang menjawab "kode mana yang live", bukan versi semantik yang manual.
      - name: Stamp build SHA
        run: echo "${{ github.sha }}" > build_sha.txt

      - name: Deploy ke App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: LMS-AI-CORRECTOR
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

      - name: Smoke test
        run: |
          URL="https://lms-ai-corrector.azurewebsites.net"
          echo "Menunggu $URL/health ..."
          curl -fsS --retry 20 --retry-delay 15 --retry-all-errors "$URL/health"
          echo ""
          echo "Commit yang di-deploy : ${{ github.sha }}"
          echo -n "Build yang live       : "
          curl -fsS "$URL/health" | grep -o '"build":"[^"]*"'
